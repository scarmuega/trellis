# <trellis runtime binding> Scheduled plane: run rituals.md rows headlessly.
# Adjust before enabling: the cron (keep it in step with rituals.md cadences —
# split into separate jobs if cadences diverge), the RITUALS list (rows whose
# executor is an agent role), the plugin checkout ref, and the budget cap.
# Requires ANTHROPIC_API_KEY in the forge's secrets. See spec companion:
# runtime.md next to the spec version pinned in decisions/0000-adopt-trellis.md.
name: trellis rituals

on:
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC — match rituals.md
  workflow_dispatch:
    inputs:
      ritual:
        description: single ritual name from rituals.md
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  rituals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out the trellis plugin
        uses: actions/checkout@v4
        with:
          repository: scarmuega/trellis
          # ref: <pin the plugin SHA your domain operates against>
          path: .trellis/plugin

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run ritual(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          RITUALS: ${{ inputs.ritual || 'conventions lint|metric sweep|derivation sweep|focus' }}
        run: |
          IFS='|'
          for ritual in $RITUALS; do
            claude -p "/trellis:ritual $ritual" \
              --plugin-dir "$PWD/.trellis/plugin" \
              --permission-mode acceptEdits \
              --allowedTools "Read" "Grep" "Glob" "Write" "Edit" "Bash(gh *)" "Bash(git *)" \
              --max-budget-usd 5
          done

      - name: Commit regenerated views
        run: |
          rm -rf .trellis
          git config user.name "trellis-steward"
          git config user.email "trellis-steward@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore(steward): refresh generated views"
            git push
          }
